<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pong Migliorato</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      background: black;
      border: 2px solid white;
    }

    #score {
      position: absolute;
      top: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<div id="score">0 : 0</div>
<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");

// Paddle settings
const paddleWidth = 10;
const paddleHeight = 100;
const paddleSpeed = 6;

// Player (sinistra)
let leftPaddle = {
  x: 10,
  y: canvas.height / 2 - paddleHeight / 2,
  dy: 0
};

// IA (destra)
let rightPaddle = {
  x: canvas.width - 20,
  y: canvas.height / 2 - paddleHeight / 2
};

// Ball
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 8,
  speed: 5,
  dx: 5,
  dy: 3
};

// Score
let leftScore = 0;
let rightScore = 0;

// Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "w") leftPaddle.dy = -paddleSpeed;
  if (e.key === "s") leftPaddle.dy = paddleSpeed;
});

document.addEventListener("keyup", () => {
  leftPaddle.dy = 0;
});

// Draw
function drawRect(x, y, w, h) {
  ctx.fillStyle = "white";
  ctx.fillRect(x, y, w, h);
}

function drawBall(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
}

function drawNet() {
  for (let i = 0; i < canvas.height; i += 20) {
    drawRect(canvas.width / 2 - 1, i, 2, 10);
  }
}

// Collision migliorata
function collision(b, p) {
  return (
    b.x - b.radius < p.x + paddleWidth &&
    b.x + b.radius > p.x &&
    b.y - b.radius < p.y + paddleHeight &&
    b.y + b.radius > p.y
  );
}

// Update
function update() {
  // Movimento player
  leftPaddle.y += leftPaddle.dy;

  // Limiti schermo
  leftPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, leftPaddle.y));

  // IA semplice (segue la palla)
  rightPaddle.y += (ball.y - (rightPaddle.y + paddleHeight / 2)) * 0.1;

  // Ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Collisione con muri
  if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
    ball.dy *= -1;
  }

  // Collisione paddles
  if (collision(ball, leftPaddle)) {
    ball.dx = Math.abs(ball.dx) + 0.3;

    let collidePoint = ball.y - (leftPaddle.y + paddleHeight / 2);
    collidePoint /= (paddleHeight / 2);

    ball.dy = collidePoint * 5;
  }

  if (collision(ball, rightPaddle)) {
    ball.dx = -Math.abs(ball.dx) - 0.3;

    let collidePoint = ball.y - (rightPaddle.y + paddleHeight / 2);
    collidePoint /= (paddleHeight / 2);

    ball.dy = collidePoint * 5;
  }

  // Score
  if (ball.x < 0) {
    rightScore++;
    resetBall();
  }

  if (ball.x > canvas.width) {
    leftScore++;
    resetBall();
  }

  scoreEl.textContent = `${leftScore} : ${rightScore}`;
}

// Reset
function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.dx = -ball.dx;
  ball.dy = (Math.random() - 0.5) * 6;
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawNet();
  drawRect(leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
  drawRect(rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);
  drawBall(ball.x, ball.y, ball.radius);
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
