<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }

    canvas {
      background: black;
      border: 2px solid white;
    }

    #score {
      position: absolute;
      top: 20px;
      font-size: 30px;
    }
  </style>
</head>
<body>

<div id="score">0 : 0</div>
<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");

// Paddle
const paddleWidth = 10;
const paddleHeight = 100;
const paddleSpeed = 6;

// Player (sinistra)
let player = {
  x: 10,
  y: canvas.height / 2 - paddleHeight / 2
};

// AI (destra)
let ai = {
  x: canvas.width - 20,
  y: canvas.height / 2 - paddleHeight / 2
};

// Ball
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  r: 8,
  dx: 5,
  dy: 3
};

// Score
let playerScore = 0;
let aiScore = 0;

// Input
let up = false;
let down = false;

document.addEventListener("keydown", (e) => {
  if (e.key === "w") up = true;
  if (e.key === "s") down = true;
});

document.addEventListener("keyup", (e) => {
  if (e.key === "w") up = false;
  if (e.key === "s") down = false;
});

// Disegno
function rect(x, y, w, h) {
  ctx.fillStyle = "white";
  ctx.fillRect(x, y, w, h);
}

function circle(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
}

function net() {
  for (let i = 0; i < canvas.height; i += 20) {
    rect(canvas.width / 2 - 1, i, 2, 10);
  }
}

// Collisione
function hit(b, p) {
  return (
    b.x - b.r < p.x + paddleWidth &&
    b.x + b.r > p.x &&
    b.y - b.r < p.y + paddleHeight &&
    b.y + b.r > p.y
  );
}

// Update
function update() {

  // Movimento player
  if (up) player.y -= paddleSpeed;
  if (down) player.y += paddleSpeed;

  // Limiti
  player.y = Math.max(0, Math.min(canvas.height - paddleHeight, player.y));

  // IA semplice
  ai.y += (ball.y - (ai.y + paddleHeight / 2)) * 0.08;

  // Movimento palla
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Muri
  if (ball.y < 0 || ball.y > canvas.height) {
    ball.dy *= -1;
  }

  // Collisioni
  if (hit(ball, player)) {
    ball.dx = Math.abs(ball.dx);

    let collide = ball.y - (player.y + paddleHeight / 2);
    ball.dy = collide * 0.1;
  }

  if (hit(ball, ai)) {
    ball.dx = -Math.abs(ball.dx);

    let collide = ball.y - (ai.y + paddleHeight / 2);
    ball.dy = collide * 0.1;
  }

  // Punto
  if (ball.x < 0) {
    aiScore++;
    reset();
  }

  if (ball.x > canvas.width) {
    playerScore++;
    reset();
  }

  scoreEl.textContent = playerScore + " : " + aiScore;
}

// Reset
function reset() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.dx *= -1;
  ball.dy = Math.random() * 4 - 2;
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  net();
  rect(player.x, player.y, paddleWidth, paddleHeight);
  rect(ai.x, ai.y, paddleWidth, paddleHeight);
  circle(ball.x, ball.y, ball.r);
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
</body>
</html>
