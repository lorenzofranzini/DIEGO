<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pong Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      background: black;
      border: 2px solid white;
    }

    #score {
      position: absolute;
      top: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<div id="score">0 : 0</div>
<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");

// Paddles
const paddleWidth = 10;
const paddleHeight = 100;

let leftPaddle = {
  x: 10,
  y: canvas.height / 2 - paddleHeight / 2,
  dy: 0
};

let rightPaddle = {
  x: canvas.width - 20,
  y: canvas.height / 2 - paddleHeight / 2,
  dy: 0
};

// Ball
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 8,
  speed: 5,
  dx: 5,
  dy: 5
};

// Score
let leftScore = 0;
let rightScore = 0;

// Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "w") leftPaddle.dy = -6;
  if (e.key === "s") leftPaddle.dy = 6;

  if (e.key === "ArrowUp") rightPaddle.dy = -6;
  if (e.key === "ArrowDown") rightPaddle.dy = 6;
});

document.addEventListener("keyup", () => {
  leftPaddle.dy = 0;
  rightPaddle.dy = 0;
});

// Draw functions
function drawRect(x, y, w, h) {
  ctx.fillStyle = "white";
  ctx.fillRect(x, y, w, h);
}

function drawBall(x, y, r) {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawNet() {
  for (let i = 0; i < canvas.height; i += 20) {
    drawRect(canvas.width / 2 - 1, i, 2, 10);
  }
}

// Update
function update() {
  leftPaddle.y += leftPaddle.dy;
  rightPaddle.y += rightPaddle.dy;

  // Ball movement
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collision
  if (ball.y < 0 || ball.y > canvas.height) {
    ball.dy *= -1;
  }

  // Paddle collision
  if (
    ball.x < leftPaddle.x + paddleWidth &&
    ball.y > leftPaddle.y &&
    ball.y < leftPaddle.y + paddleHeight
  ) {
    ball.dx *= -1;
  }

  if (
    ball.x > rightPaddle.x &&
    ball.y > rightPaddle.y &&
    ball.y < rightPaddle.y + paddleHeight
  ) {
    ball.dx *= -1;
  }

  // Score
  if (ball.x < 0) {
    rightScore++;
    resetBall();
  }

  if (ball.x > canvas.width) {
    leftScore++;
    resetBall();
  }

  scoreEl.textContent = `${leftScore} : ${rightScore}`;
}

// Reset ball
function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.dx *= -1;
  ball.dy = (Math.random() - 0.5) * 10;
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawNet();
  drawRect(leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
  drawRect(rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);
  drawBall(ball.x, ball.y, ball.radius);
}

// Game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
